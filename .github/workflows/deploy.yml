name: Deploy to portal.nnak.or.ke

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: Build
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Build Docker image on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: git@github.com:${{ github.repository }}.git
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL || 'admin@nnak.or.ke' }}
        run: |
          # First-time bootstrap — clone as deploy user (has GitHub SSH key)
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
                REPO_URL="$REPO_URL" \
            bash -s << 'REMOTE_SCRIPT'
            set -euo pipefail
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "==> First deploy — cloning repository..."
              mkdir -p "$DEPLOY_PATH"
              ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
              git clone "$REPO_URL" "$DEPLOY_PATH"
              echo "==> Clone complete!"
              exit 0
            fi
            echo "==> Repository already exists — skipping clone."
          REMOTE_SCRIPT

          # Run server-setup as root (needed for apt, nginx config, systemctl)
          ssh -p "$SERVER_PORT" "root@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
                LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
            bash -s << 'ROOT_SCRIPT'
            set -euo pipefail
            if [ -f "$DEPLOY_PATH/scripts/server-setup.sh" ]; then
              echo "==> Running full server setup (SSL, Docker, Nginx)..."
              cd "$DEPLOY_PATH"
              bash scripts/server-setup.sh
              echo "==> Initial setup complete!"
            fi
          ROOT_SCRIPT

          # Pull latest & build as deploy user
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
            bash -s << 'BUILD_SCRIPT'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "==> Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main
            echo "    At commit: $(git rev-parse --short HEAD)"

            echo "==> Building Next.js Docker image..."
            docker compose build --no-cache app
            echo "==> Build complete!"
          BUILD_SCRIPT

  # ═══════════════════════════════════════════════════════════
  # Job 2: Deploy
  # ═══════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Pre-deploy SSL cert & nginx health check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL || 'admin@nnak.or.ke' }}
        run: |
          # Run SSL checks as root (same as server-setup.sh in build job)
          ssh -p "$SERVER_PORT" "root@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
                LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
                APP_PORT="${APP_PORT:-3010}" \
            bash -s << 'SSL_CHECK'
            set -euo pipefail

            DOMAIN="portal.nnak.or.ke"
            CERT_DIR="/etc/letsencrypt/live/$DOMAIN"

            echo "==> [SSL Pre-check] Verifying SSL certificates & nginx health..."

            # ── 1. Check if cert directory exists ──────────
            if [ ! -d "$CERT_DIR" ]; then
              echo "::warning:: SSL cert directory $CERT_DIR does not exist!"
              echo "    Attempting to obtain certificate via certbot..."

              # Ensure nginx is running with HTTP-only config
              if ! systemctl is-active --quiet nginx; then
                # Temporarily disable HTTPS block to allow certbot to work
                if [ -f "/etc/nginx/sites-enabled/$DOMAIN" ]; then
                  sed -i '/^# ── HTTPS/,/^}$/s/^/#/' "/etc/nginx/sites-enabled/$DOMAIN"
                fi
                nginx -t && systemctl start nginx || {
                  echo "::error:: nginx failed to start. Cannot obtain SSL cert."
                  exit 1
                }
              fi

              certbot certonly --webroot -w /var/www/certbot \
                -d "$DOMAIN" \
                --non-interactive --agree-tos \
                --email "$LETSENCRYPT_EMAIL" || {
                echo "::error:: certbot failed to obtain certificate."
                exit 1
              }
              echo "    Certificate obtained successfully."
            else
              echo "    ✓ Cert directory exists: $CERT_DIR"
            fi

            # ── 2. Check cert expiration ──────────────────
            CERT_FILE="$CERT_DIR/fullchain.pem"
            if [ -f "$CERT_FILE" ]; then
              EXPIRY=$(openssl x509 -in "$CERT_FILE" -noout -enddate 2>/dev/null | cut -d= -f2)
              EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || echo 0)
              NOW_EPOCH=$(date +%s)
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

              echo "    SSL cert expires: $EXPIRY ($DAYS_LEFT days remaining)"

              if [ "$DAYS_LEFT" -lt 0 ]; then
                echo "::error:: SSL certificate has EXPIRED! Attempting renewal..."
                certbot renew --nginx --non-interactive || {
                  echo "::error:: certbot renewal failed."
                  exit 1
                }
                echo "    Certificate renewed."
              elif [ "$DAYS_LEFT" -lt 7 ]; then
                echo "::warning:: Certificate expires in $DAYS_LEFT days. Renewing early..."
                certbot renew --nginx --non-interactive || {
                  echo "::warning:: Early renewal failed, but cert is still valid for $DAYS_LEFT days."
                }
              else
                echo "    ✓ Certificate is valid."
              fi
            else
              echo "::error:: Certificate file $CERT_FILE not found!"
              exit 1
            fi

            # ── 3. Verify nginx config syntax ─────────────
            echo ""
            if nginx -t 2>&1; then
              echo "    ✓ nginx config syntax is valid."
            else
              echo "::error:: nginx config test FAILED. Restoring from repo template..."
              # Restore the pristine vhost config
              if [ -f "$DEPLOY_PATH/nginx/host-vhost.conf" ]; then
                APP_PORT="${APP_PORT:-3010}"
                cp "$DEPLOY_PATH/nginx/host-vhost.conf" "/etc/nginx/sites-available/$DOMAIN"
                sed -i "s/__APP_PORT__/$APP_PORT/g" "/etc/nginx/sites-available/$DOMAIN"
                nginx -t && echo "    Config restored and valid." || {
                  echo "::error:: Config still invalid after restore."
                  exit 1
                }
              fi
            fi

            # ── 4. Ensure nginx is running ────────────────
            echo ""
            if systemctl is-active --quiet nginx; then
              echo "    ✓ nginx is running."
            else
              echo "::warning:: nginx is not running. Starting..."
              systemctl start nginx || {
                echo "::error:: Failed to start nginx."
                exit 1
              }
              echo "    nginx started."
            fi

            echo ""
            echo "==> SSL pre-check complete — all OK."
          SSL_CHECK

      - name: Deploy container on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" bash -s << 'DEPLOY_SCRIPT'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "==> [$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Starting deploy..."

            # Stop conflicting containers
            echo "==> Checking for containers competing on ports 80 / 443..."
            CONFLICT=$(docker ps --format '{{.ID}} {{.Names}} {{.Ports}}' \
              | grep -E '0\.0\.0\.0:(80|443)->' || true)
            if [ -n "$CONFLICT" ]; then
              echo "    Found — stopping:"
              echo "$CONFLICT"
              echo "$CONFLICT" | awk '{print $1}' | xargs docker stop
              echo "$CONFLICT" | awk '{print $1}' | xargs docker update --restart=no || true
            else
              echo "    None found."
            fi

            echo "==> Bringing up updated app container..."
            docker compose up -d --remove-orphans app

            # Wait for app healthcheck to pass
            echo "==> Waiting for app container to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker compose ps --format json app 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "healthy" ]; then
                echo "    App is healthy after ${i}s."
                break
              fi
              sleep 2
            done

            echo "==> Deploy complete!"
          DEPLOY_SCRIPT

      - name: Rewrite nginx config & reload (root)
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$SERVER_PORT" "root@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" \
                APP_PORT="${APP_PORT:-3010}" \
            bash -s << 'NGINX_RELOAD'
            set -euo pipefail
            DOMAIN="portal.nnak.or.ke"

            echo "==> Overwriting nginx config from repo template (undoes certbot damage)..."
            cp "$DEPLOY_PATH/nginx/host-vhost.conf" "/etc/nginx/sites-available/$DOMAIN"
            sed -i "s/__APP_PORT__/$APP_PORT/g" "/etc/nginx/sites-available/$DOMAIN"

            # Ensure sites-enabled symlink exists
            if [ ! -L "/etc/nginx/sites-enabled/$DOMAIN" ]; then
              ln -sf "/etc/nginx/sites-available/$DOMAIN" "/etc/nginx/sites-enabled/$DOMAIN"
            fi

            # Prevent certbot from modifying the config
            chmod 444 "/etc/nginx/sites-available/$DOMAIN"

            echo "==> Testing & reloading nginx..."
            nginx -t && nginx -s reload && echo "    nginx reloaded successfully." || {
              echo "::error:: nginx reload failed!"
              nginx -t 2>&1 || true
              exit 1
            }
          NGINX_RELOAD

      - name: Container & SSL diagnostics
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            env DEPLOY_PATH="$DEPLOY_PATH" bash -s << 'DIAG'
            cd "$DEPLOY_PATH" 2>/dev/null || { echo "DEPLOY_PATH missing"; exit 0; }
            echo "=== Container status ==="
            docker compose ps
            echo ""
            echo "=== App logs (last 30 lines) ==="
            docker compose logs --tail=30 app
            echo ""
            echo "=== Host nginx status ==="
            systemctl is-active nginx || true
            echo ""
            echo "=== Nginx sites-enabled ==="
            ls -la /etc/nginx/sites-enabled/ 2>/dev/null || echo "no sites-enabled dir"
            echo ""
            echo "=== Portal vhost (first 20 lines) ==="
            head -20 /etc/nginx/sites-available/portal.nnak.or.ke 2>/dev/null || echo "vhost file not found"
            echo ""
            echo "=== Nginx error log (last 20 lines) ==="
            tail -20 /var/log/nginx/error.log 2>/dev/null || echo "no error log"
            echo ""
            echo "=== SSL cert status ==="
            ls -la /etc/letsencrypt/live/portal.nnak.or.ke/ 2>/dev/null || echo "No cert directory found"
          DIAG

      - name: Verify site is reachable
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 5 --retry-delay 5 \
            http://portal.nnak.or.ke)
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" == "000" ]]; then
            echo "::error::Site is unreachable (curl returned 000). Check server logs."
            exit 1
          fi
          echo "Site is up and responding (HTTP $HTTP_STATUS)."
