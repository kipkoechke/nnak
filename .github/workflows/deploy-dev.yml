name: Deploy Development

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/nnak-frontend-dev
            
            # If there is no .git folder, clone the dev branch directly into this folder
            if [ ! -d ".git" ]; then
              echo "Repository not found. Cloning for the first time..."
              git clone -b dev https://github.com/Data-Systems-Engineering-Ltd/nnak.git .
            else
              echo "Repository found. Pulling latest changes..."
              git fetch origin dev
              git reset --hard origin/dev
            fi
            
            # Now that the files are guaranteed to be here, run Docker
            docker compose -f docker-compose.dev.yml down
            docker compose -f docker-compose.dev.yml up -d --build