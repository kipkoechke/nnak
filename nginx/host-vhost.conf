# /etc/nginx/sites-available/portal.nnak.or.ke
# Installed automatically by server-setup.sh
# SSL managed by host certbot (not containerized)
#
# The Next.js app runs in Docker on port APP_PORT (default 3010).
# This nginx vhost proxies portal.nnak.or.ke → localhost:3010

upstream nnak_app {
    server 127.0.0.1:__APP_PORT__;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name portal.nnak.or.ke;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → Next.js app ───────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name portal.nnak.or.ke;

    ssl_certificate     /etc/letsencrypt/live/portal.nnak.or.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.nnak.or.ke/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:lems_SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    proxy_http_version  1.1;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_cache_bypass  $http_upgrade;
    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://nnak_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nnak_app;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    client_max_body_size 20M;

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
