# /etc/nginx/sites-available/portal.nnak.or.ke
# Installed automatically by server-setup.sh
# SSL managed by host certbot (not containerized)
#
# The Next.js app runs in Docker on port APP_PORT (default 3010).
# This nginx vhost proxies portal.nnak.or.ke → localhost:3010
#
# ⚠️  CERTBOT WARNING: Do NOT use `certbot --nginx` or `certbot --redirect`.
#    It will insert a `return 301` inside the HTTPS block, breaking the site.
#    Use `certbot certonly --webroot` for renewals instead.
#    This file is overwritten by CI/CD on every deploy.

upstream nnak_app {
    server 127.0.0.1:__APP_PORT__;
    keepalive 32;
}

# ── HTTP redirect & ACME challenge ────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name portal.nnak.or.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → Next.js app ───────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name portal.nnak.or.ke;

    ssl_certificate     /etc/letsencrypt/live/portal.nnak.or.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.nnak.or.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    proxy_http_version  1.1;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_cache_bypass  $http_upgrade;
    proxy_read_timeout  60s;

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://nnak_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nnak_app;
        add_header Cache-Control "no-store";
    }

    client_max_body_size 20M;
}
