# ──────────────────────────────────────────────────────────
# Upstream: Next.js Dev container
# ──────────────────────────────────────────────────────────
upstream nnak_dev_app {
    server 127.0.0.1:3020;
    keepalive 32;
}

# ──────────────────────────────────────────────────────────
# HTTP  →  redirect to HTTPS + ACME challenge endpoint
# ──────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name demo.nnak.or.ke;

    # Let's Encrypt / Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────
# HTTPS  →  proxy to Next.js Dev container
# ──────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name demo.nnak.or.ke;

    # ── SSL certificates (managed by Certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/demo.nnak.or.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.nnak.or.ke/privkey.pem;

    # ── SSL settings ─────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;

    # ── Security headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Proxy settings ───────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_cache_bypass  $http_upgrade;
    proxy_read_timeout  60s;

    # ── Application ───────────────────────────────────────
    location / {
        proxy_pass http://nnak_dev_app;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Max upload size ──────────────────────────────────
    client_max_body_size 20M;
}