services:
  # ── Next.js application (development) ────────────────────
  frontend-dev:
    container_name: nnak-frontend-dev-app
    image: nnak-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NNAK_API_URL: ${NEXT_PUBLIC_NNAK_API_URL:-}
    ports:
      - "3020:3000"  # Maps VPS port 3020 to internal container port 3000
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  web:
    driver: bridge